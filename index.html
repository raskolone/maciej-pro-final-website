  <body>
    <!-- Dark mode init: apply theme before React hydrates to prevent flash -->
    <script>
      (function() {
        var stored = localStorage.getItem('theme');
        var html = document.documentElement;
        html.classList.remove('light');
        if (stored === 'light') {
          html.classList.add('light');
        }
      })();
    </script>
